version: "3"
services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=lecturia
      - POSTGRES_USER=lecturia
      - POSTGRES_PASSWORD=lecturia
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
  gcs:
    image: fsouza/fake-gcs-server
    ports:
      - 4443:4443
    volumes:
      - ./lecturia-public-storage:/data/${GOOGLE_CLOUD_STORAGE_PUBLIC_BUCKET_NAME}
    command:
      ["-scheme", "http", "-port", "4443", "-external-url", "http://gcs:4443"]
  gcloud-tasks-emulator:
    image: ghcr.io/aertje/cloud-tasks-emulator:latest
    command: -host 0.0.0.0 -port 8123 -queue "projects/${GOOGLE_CLOUD_PROJECT}/locations/${GOOGLE_CLOUD_LOCATION}/queues/lecture-queue"
    ports:
      - "${TASKS_PORT:-8123}:8123"
    environment:
      APP_ENGINE_EMULATOR_HOST: http://localhost:8080
  lecturia:
    build:
      context: .
      dockerfile: Dockerfile
    image: lecturia:latest
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://lecturia:lecturia@postgres:5432/lecturia}
      - STORAGE_EMULATOR_HOST=http://gcs:4443
      - LECTURIA_WORKER_URL=http://worker:8001
    env_file:
      - .env
    depends_on:
      - postgres
      - gcs
      - gcloud-tasks-emulator
  worker:
    image: lecturia:latest
    command: ["fastapi", "run", "src/lecturia/cloud_pipeline/workflow.py", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://lecturia:lecturia@postgres:5432/lecturia}
      - STORAGE_EMULATOR_HOST=http://gcs:4443
    env_file:
      - .env
    depends_on:
      - postgres
      - gcs
volumes:
  postgres_data:
